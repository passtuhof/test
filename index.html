<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Дело у старого дома</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
  html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#050505;font-family:Arial,sans-serif;color:#fff;touch-action:none}
  canvas{display:block;width:100vw;height:100vh;background:#080808}
  #hud{position:fixed;inset:0;pointer-events:none}
  #top{position:absolute;left:10px;right:10px;top:10px;padding:10px 12px;border:1px solid rgba(255,255,255,.15);background:rgba(0,0,0,.58);border-radius:14px;font-size:14px;line-height:1.28;backdrop-filter:blur(8px)}
  #title{font-weight:700;color:#ff4a4a;margin-bottom:4px;font-size:16px}
  #task{color:#ddd}
  #centerDot{position:absolute;left:50%;top:50%;width:8px;height:8px;margin-left:-4px;margin-top:-4px;border-radius:50%;background:#fff;opacity:.6;box-shadow:0 0 10px #fff}
  #controls{position:fixed;left:0;right:0;bottom:0;height:190px;pointer-events:auto}
  .btn{position:absolute;border:1px solid rgba(255,255,255,.22);background:rgba(255,255,255,.13);color:#fff;border-radius:22px;font-weight:700;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 25px rgba(0,0,0,.25);backdrop-filter:blur(7px)}
  .btn:active{transform:scale(.96);background:rgba(255,255,255,.26)}
  .move{width:64px;height:64px;font-size:28px}
  #up{left:84px;bottom:118px} #down{left:84px;bottom:36px} #left{left:16px;bottom:36px} #right{left:152px;bottom:36px}
  #lookLeft{right:100px;bottom:48px;width:70px;height:70px;font-size:30px}
  #lookRight{right:18px;bottom:48px;width:70px;height:70px;font-size:30px}
  #action{right:18px;bottom:126px;width:152px;height:50px;border-radius:18px;background:rgba(200,30,30,.62);font-size:15px}
  #dialog{position:fixed;left:10px;right:10px;bottom:198px;background:rgba(8,8,8,.88);border:1px solid rgba(255,255,255,.18);border-radius:18px;padding:12px;display:none;pointer-events:auto;box-shadow:0 0 30px rgba(0,0,0,.6)}
  #speaker{font-weight:700;color:#ff5555;margin-bottom:6px}
  #text{font-size:15px;line-height:1.35;margin-bottom:10px;color:#eee}
  .choice{width:100%;border:0;margin-top:7px;padding:12px;border-radius:13px;background:#222;color:white;font-size:15px;text-align:left}
  .choice:active{background:#444}
  #bigMessage{position:fixed;inset:0;background:rgba(0,0,0,.84);display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;font-size:24px;line-height:1.35;z-index:9}
  #startBtn{margin-top:18px;padding:14px 22px;border-radius:16px;border:0;background:#b91c1c;color:#fff;font-weight:700;font-size:18px}
  #notice{position:fixed;left:50%;top:47%;transform:translate(-50%,-50%);background:rgba(0,0,0,.78);border:1px solid rgba(255,255,255,.18);border-radius:16px;padding:12px 16px;font-size:16px;display:none;pointer-events:none;text-align:center;max-width:84vw}
  @media (min-width:800px){#top{font-size:16px;max-width:520px}.btn{opacity:.75}}
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="hud">
  <div id="top">
    <div id="title">Дело у старого дома</div>
    <div id="task">Нажми «Начать». Потом подойди к свидетелям и жми «Говорить».</div>
  </div>
  <div id="centerDot"></div>
</div>

<div id="dialog">
  <div id="speaker"></div>
  <div id="text"></div>
  <div id="choices"></div>
</div>

<div id="controls">
  <div class="btn move" id="up">▲</div>
  <div class="btn move" id="down">▼</div>
  <div class="btn move" id="left">◀</div>
  <div class="btn move" id="right">▶</div>
  <div class="btn" id="lookLeft">⟲</div>
  <div class="btn" id="lookRight">⟳</div>
  <div class="btn" id="action">Осмотреть</div>
</div>

<div id="notice"></div>

<div id="bigMessage">
  <div>
    <b>Дело у старого дома</b><br><br>
    Ночью в городе произошло убийство.<br>
    Ты детектив. Опроси свидетелей, найди зацепку, садись в машину и доберись до дома преступника.<br>
    <button id="startBtn">Начать</button>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const taskEl = document.getElementById('task');
const actionEl = document.getElementById('action');
const dialogEl = document.getElementById('dialog');
const speakerEl = document.getElementById('speaker');
const textEl = document.getElementById('text');
const choicesEl = document.getElementById('choices');
const noticeEl = document.getElementById('notice');
const bigMessage = document.getElementById('bigMessage');

function resize(){canvas.width=innerWidth*devicePixelRatio;canvas.height=innerHeight*devicePixelRatio;ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0)}
addEventListener('resize',resize);resize();

let scene='city';
let player={x:0,z:0,a:0};
let keys={up:false,down:false,left:false,right:false,lookL:false,lookR:false};
let talked={old:false,girl:false,guard:false};
let clue=false, carReady=false, atHouse=false, finished=false;
let inDialog=false;

const cityObjects=[
  {type:'npc',id:'old',name:'Старик у подъезда',x:-4,z:9,color:'#7dd3fc'},
  {type:'npc',id:'girl',name:'Девушка-свидетель',x:5,z:13,color:'#f0abfc'},
  {type:'npc',id:'guard',name:'Охранник магазина',x:1,z:20,color:'#fde68a'},
  {type:'corpse',name:'Место преступления',x:0,z:6,color:'#ef4444'},
  {type:'car',name:'Служебная машина',x:-7,z:24,color:'#60a5fa'},
  ...Array.from({length:18},(_,i)=>({type:'building',x:(i%2?-9:9),z:4+i*3,w:3,h:4+i%3,color:i%2?'#222':'#292929'}))
];
const roadObjects=[
  {type:'house',name:'Двухэтажный дом',x:0,z:33,color:'#555'},
  {type:'criminal',name:'Преступник',x:0,z:39,color:'#ff3333'},
  ...Array.from({length:22},(_,i)=>({type:'tree',x:(i%2?-7:7)+(Math.random()*2-1),z:3+i*2.2,color:'#14532d'}))
];

function showNotice(t){noticeEl.textContent=t;noticeEl.style.display='block';clearTimeout(showNotice.t);showNotice.t=setTimeout(()=>noticeEl.style.display='none',1600)}
function setTask(t){taskEl.textContent=t}

function dist(o){return Math.hypot(o.x-player.x,o.z-player.z)}
function nearObject(){
  const list=scene==='city'?cityObjects:roadObjects;
  return list.filter(o=>dist(o)<2.5).sort((a,b)=>dist(a)-dist(b))[0];
}

function openDialog(speaker,text,choices){
  inDialog=true; dialogEl.style.display='block';
  speakerEl.textContent=speaker; textEl.textContent=text; choicesEl.innerHTML='';
  choices.forEach(c=>{const b=document.createElement('button');b.className='choice';b.textContent=c.label;b.onclick=()=>c.fn();choicesEl.appendChild(b)});
}
function closeDialog(){inDialog=false;dialogEl.style.display='none'}

function talkNpc(id){
  if(id==='old') openDialog('Старик у подъезда','Я слышал резкий хлопок и видел человека в сером пальто. Он быстро ушёл к синей машине.',[
    {label:'Спросить про машину',fn:()=>{talked.old=true;closeDialog();showNotice('Зацепка: синяя машина');checkClue()}},
    {label:'Закончить',fn:()=>{talked.old=true;closeDialog();checkClue()}}
  ]);
  if(id==='girl') openDialog('Девушка-свидетель','Перед убийством жертва спорила с мужчиной. Он повторял: «Увидимся у старого дома за городом».',[
    {label:'Уточнить про дом',fn:()=>{talked.girl=true;closeDialog();showNotice('Зацепка: старый дом за городом');checkClue()}},
    {label:'Закончить',fn:()=>{talked.girl=true;closeDialog();checkClue()}}
  ]);
  if(id==='guard') openDialog('Охранник магазина','Камера засняла номер машины. Она уехала по северной дороге, к лесу.',[
    {label:'Взять запись камеры',fn:()=>{talked.guard=true;closeDialog();showNotice('Есть направление: северная дорога');checkClue()}},
    {label:'Закончить',fn:()=>{talked.guard=true;closeDialog();checkClue()}}
  ]);
}
function checkClue(){
  if(talked.old&&talked.girl&&talked.guard){clue=true;carReady=true;setTask('Все зацепки собраны. Вернись к синей машине и нажми «Сесть».')}
  else setTask('Опроси всех свидетелей. Подойди к человеку и нажми «Говорить».')
}

function action(){
  if(inDialog||finished)return;
  const o=nearObject();
  if(!o){showNotice('Подойди ближе к объекту');return}
  if(o.type==='npc'){talkNpc(o.id);return}
  if(o.type==='corpse'){showNotice('Жертва найдена. Нужны свидетели.');setTask('Опроси свидетелей рядом с местом преступления.');return}
  if(o.type==='car'){
    if(!carReady){showNotice('Сначала собери зацепки у свидетелей');return}
    scene='road';player={x:0,z:0,a:0};setTask('Ты едешь за город. Дойди до двухэтажного дома и найди преступника.');showNotice('Поездка за город...');return
  }
  if(o.type==='house'){atHouse=true;showNotice('Дом найден. Преступник где-то рядом.');setTask('Обойди дом и найди преступника.');return}
  if(o.type==='criminal'){
    openDialog('Преступник','Ты всё-таки нашёл меня, детектив. Но доказательств у тебя нет.',[
      {label:'Показать запись камеры и показания свидетелей',fn:()=>{closeDialog();finish()}},
      {label:'Сказать: «Признавайся»',fn:()=>{textEl.textContent='Он молчит. Нужны доказательства.'}}
    ]);
  }
}
function finish(){finished=true;bigMessage.style.display='flex';bigMessage.innerHTML='<div><b>Дело раскрыто</b><br><br>Свидетели дали зацепки, камера подтвердила маршрут, а преступник найден в доме за городом.<br><br><button id="startBtn" onclick="location.reload()">Играть снова</button></div>'}

document.getElementById('startBtn').onclick=()=>{bigMessage.style.display='none';setTask('Осмотри место преступления и поговори со свидетелями. Управление кнопками на экране.')};
['up','down','left','right'].forEach(id=>{const e=document.getElementById(id);e.onpointerdown=()=>keys[id]=true;e.onpointerup=e.onpointercancel=e.onpointerleave=()=>keys[id]=false});
document.getElementById('lookLeft').onpointerdown=()=>keys.lookL=true;document.getElementById('lookLeft').onpointerup=document.getElementById('lookLeft').onpointercancel=()=>keys.lookL=false;
document.getElementById('lookRight').onpointerdown=()=>keys.lookR=true;document.getElementById('lookRight').onpointerup=document.getElementById('lookRight').onpointercancel=()=>keys.lookR=false;
actionEl.onclick=action;
addEventListener('keydown',e=>{if(e.key==='w'||e.key==='ArrowUp')keys.up=true;if(e.key==='s'||e.key==='ArrowDown')keys.down=true;if(e.key==='a')keys.left=true;if(e.key==='d')keys.right=true;if(e.key==='ArrowLeft')keys.lookL=true;if(e.key==='ArrowRight')keys.lookR=true;if(e.key==='e'||e.key===' ')action()});
addEventListener('keyup',e=>{if(e.key==='w'||e.key==='ArrowUp')keys.up=false;if(e.key==='s'||e.key==='ArrowDown')keys.down=false;if(e.key==='a')keys.left=false;if(e.key==='d')keys.right=false;if(e.key==='ArrowLeft')keys.lookL=false;if(e.key==='ArrowRight')keys.lookR=false});

function update(){
  if(!inDialog&&!finished){
    if(keys.lookL)player.a-=0.045;if(keys.lookR)player.a+=0.045;
    let sp=0.09;
    let dx=0,dz=0;
    if(keys.up){dx+=Math.sin(player.a)*sp;dz+=Math.cos(player.a)*sp}
    if(keys.down){dx-=Math.sin(player.a)*sp;dz-=Math.cos(player.a)*sp}
    if(keys.left){dx-=Math.cos(player.a)*sp;dz+=Math.sin(player.a)*sp}
    if(keys.right){dx+=Math.cos(player.a)*sp;dz-=Math.sin(player.a)*sp}
    player.x+=dx;player.z+=dz;
    player.x=Math.max(-11,Math.min(11,player.x));player.z=Math.max(-3,Math.min(scene==='city'?30:43,player.z));
  }
  const o=nearObject();
  if(o){
    actionEl.textContent=o.type==='npc'?'Говорить':o.type==='car'?'Сесть':o.type==='criminal'?'Арест':o.type==='corpse'?'Осмотреть':'Осмотреть';
  } else actionEl.textContent='Осмотреть';
}
function project(o){
  const dx=o.x-player.x,dz=o.z-player.z;
  const s=Math.sin(player.a),c=Math.cos(player.a);
  const x=dx*c-dz*s;
  const z=dx*s+dz*c;
  if(z<=0.25)return null;
  const f=innerWidth*0.78;
  return {x:innerWidth/2+x/z*f,y:innerHeight/2+60/z,scale:f/z,z};
}
function drawGround(){
  const w=innerWidth,h=innerHeight;
  let sky=ctx.createLinearGradient(0,0,0,h/2);sky.addColorStop(0,'#020205');sky.addColorStop(1,'#15151a');ctx.fillStyle=sky;ctx.fillRect(0,0,w,h/2);
  let ground=ctx.createLinearGradient(0,h/2,0,h);ground.addColorStop(0,'#151515');ground.addColorStop(1,'#030303');ctx.fillStyle=ground;ctx.fillRect(0,h/2,w,h/2);
  ctx.strokeStyle='rgba(255,255,255,.08)';ctx.lineWidth=2;
  for(let i=1;i<16;i++){let y=h/2+i*i*2.2;ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke()}
  ctx.fillStyle=scene==='city'?'#1f1f1f':'#171717';ctx.fillRect(w/2-80,h/2,160,h/2);
  ctx.strokeStyle='rgba(255,255,255,.18)';ctx.setLineDash([18,18]);ctx.beginPath();ctx.moveTo(w/2,h/2);ctx.lineTo(w/2,h);ctx.stroke();ctx.setLineDash([]);
}
function drawObject(o){
  const p=project(o);if(!p||p.x<-300||p.x>innerWidth+300)return;
  const base=Math.min(260,Math.max(18,p.scale*.06));
  if(o.type==='building'){
    const bw=Math.min(180,p.scale*.045*o.w),bh=Math.min(420,p.scale*.065*o.h);
    ctx.fillStyle=o.color;ctx.fillRect(p.x-bw/2,p.y-bh,bw,bh);
    ctx.strokeStyle='#444';ctx.strokeRect(p.x-bw/2,p.y-bh,bw,bh);
    ctx.fillStyle='rgba(255,235,150,.6)';for(let yy=0;yy<3;yy++)for(let xx=0;xx<2;xx++)ctx.fillRect(p.x-bw/3+xx*bw/3,p.y-bh+20+yy*36,12,14);
  } else if(o.type==='npc'||o.type==='criminal'){
    ctx.fillStyle=o.color;ctx.beginPath();ctx.arc(p.x,p.y-base*2.25,base*.45,0,Math.PI*2);ctx.fill();
    ctx.fillRect(p.x-base*.35,p.y-base*1.8,base*.7,base*1.55);
    ctx.fillStyle='#fff';ctx.font=Math.max(11,base*.42)+'px Arial';ctx.textAlign='center';ctx.fillText(o.name,p.x,p.y-base*2.95);
  } else if(o.type==='corpse'){
    ctx.fillStyle='#8b0000';ctx.fillRect(p.x-base,p.y-base*.2,base*2,base*.35);ctx.fillStyle='#ff4444';ctx.font=Math.max(14,base*.7)+'px Arial';ctx.textAlign='center';ctx.fillText('✕',p.x,p.y-base*.35);
  } else if(o.type==='car'){
    ctx.fillStyle=o.color;ctx.fillRect(p.x-base*1.4,p.y-base*.9,base*2.8,base*.8);ctx.fillRect(p.x-base*.7,p.y-base*1.35,base*1.4,base*.55);ctx.fillStyle='#111';ctx.beginPath();ctx.arc(p.x-base*.8,p.y-base*.05,base*.28,0,7);ctx.arc(p.x+base*.8,p.y-base*.05,base*.28,0,7);ctx.fill();
  } else if(o.type==='tree'){
    ctx.fillStyle='#3f2a16';ctx.fillRect(p.x-base*.12,p.y-base*1.2,base*.24,base*1.2);ctx.fillStyle=o.color;ctx.beginPath();ctx.arc(p.x,p.y-base*1.55,base*.8,0,7);ctx.fill();
  } else if(o.type==='house'){
    let bw=base*4,bh=base*3.2;ctx.fillStyle='#4b5563';ctx.fillRect(p.x-bw/2,p.y-bh,bw,bh);ctx.fillStyle='#222';ctx.fillRect(p.x-bw*.18,p.y-bh*.55,bw*.36,bh*.55);ctx.fillStyle='#7f1d1d';ctx.beginPath();ctx.moveTo(p.x-bw*.6,p.y-bh);ctx.lineTo(p.x,p.y-bh-base*1.4);ctx.lineTo(p.x+bw*.6,p.y-bh);ctx.fill();ctx.fillStyle='#facc15';ctx.fillRect(p.x-bw*.35,p.y-bh*.75,base*.55,base*.45);ctx.fillRect(p.x+bw*.18,p.y-bh*.75,base*.55,base*.45);
  }
}
function render(){
  ctx.clearRect(0,0,innerWidth,innerHeight);drawGround();
  const list=(scene==='city'?cityObjects:roadObjects).slice().sort((a,b)=>dist(b)-dist(a));
  list.forEach(drawObject);
  if(scene==='road'){
    ctx.fillStyle='rgba(255,255,255,.8)';ctx.font='15px Arial';ctx.textAlign='center';ctx.fillText('Северная дорога за город',innerWidth/2,70);
  }
}
function loop(){update();render();requestAnimationFrame(loop)}loop();
</script>
</body>
</html>
