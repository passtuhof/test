<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Дело на окраине — 3D детектив</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
  html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#05070b;color:#fff;font-family:Arial,Helvetica,sans-serif}
  #game{position:fixed;inset:0;width:100%;height:100%;display:block;background:#06080e}
  #top{position:fixed;left:12px;right:12px;top:10px;z-index:5;display:flex;gap:8px;align-items:flex-start;pointer-events:none}
  #task{flex:1;background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.18);border-radius:14px;padding:10px 12px;font-size:14px;line-height:1.25;box-shadow:0 8px 30px rgba(0,0,0,.35);backdrop-filter:blur(7px)}
  #badge{background:rgba(120,0,0,.7);border:1px solid rgba(255,255,255,.2);padding:10px 11px;border-radius:14px;font-weight:700;font-size:13px;white-space:nowrap}
  #centerDot{position:fixed;left:50%;top:50%;width:8px;height:8px;margin-left:-4px;margin-top:-4px;background:#fff;border-radius:99px;opacity:.7;z-index:4;box-shadow:0 0 10px #fff}
  #dialog{position:fixed;left:10px;right:10px;bottom:130px;z-index:20;background:rgba(5,6,10,.92);border:1px solid rgba(255,255,255,.18);border-radius:18px;padding:14px;display:none;box-shadow:0 18px 45px rgba(0,0,0,.6)}
  #speaker{font-weight:800;color:#ff5555;margin-bottom:6px;font-size:18px}
  #text{font-size:15px;line-height:1.35;margin-bottom:12px}
  #choices{display:grid;gap:8px}
  .choice{border:0;border-radius:13px;background:#20283a;color:#fff;padding:12px;font-size:15px;text-align:left}
  .choice:active{transform:scale(.98);background:#33405c}
  #controls{position:fixed;inset:auto 0 0 0;height:126px;z-index:10;pointer-events:none}
  .btn{position:absolute;width:58px;height:58px;border-radius:18px;border:1px solid rgba(255,255,255,.25);background:rgba(20,25,36,.78);color:#fff;font-size:24px;font-weight:800;pointer-events:auto;box-shadow:0 8px 25px rgba(0,0,0,.4);backdrop-filter:blur(6px)}
  .btn:active{background:rgba(70,85,120,.9);transform:scale(.96)}
  #up{left:76px;bottom:65px} #down{left:76px;bottom:5px} #left{left:15px;bottom:5px} #right{left:137px;bottom:5px}
  #action{right:15px;bottom:15px;width:94px;height:94px;border-radius:28px;background:rgba(170,20,20,.88);font-size:15px;line-height:1.05;text-transform:uppercase}
  #floorBtns{position:fixed;right:12px;top:86px;z-index:6;display:none;gap:7px;flex-direction:column}
  #floorBtns button{border:1px solid rgba(255,255,255,.25);background:rgba(0,0,0,.6);color:#fff;border-radius:12px;padding:10px 12px;font-weight:800}
  #lookHint{position:fixed;right:14px;bottom:118px;z-index:5;font-size:12px;color:rgba(255,255,255,.7);background:rgba(0,0,0,.35);padding:7px 9px;border-radius:11px;pointer-events:none}
  #flash{position:fixed;inset:0;z-index:30;display:none;align-items:center;justify-content:center;text-align:center;background:rgba(0,0,0,.88);padding:25px;font-size:30px;font-weight:900;line-height:1.18}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="top"><div id="task">Загрузка...</div><div id="badge">ДЕТЕКТИВ</div></div>
<div id="centerDot"></div>
<div id="floorBtns"><button data-floor="1">1 этаж</button><button data-floor="0">Подвал</button><button data-floor="2">2 этаж</button><button data-floor="city">Выйти</button></div>
<div id="dialog"><div id="speaker"></div><div id="text"></div><div id="choices"></div></div>
<div id="controls">
  <button class="btn" id="up">▲</button><button class="btn" id="down">▼</button><button class="btn" id="left">◀</button><button class="btn" id="right">▶</button>
  <button class="btn" id="action">Действие</button>
</div>
<div id="lookHint">Води пальцем по экрану — обзор 360°</div>
<div id="flash"></div>
<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';

const canvas = document.getElementById('game');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio, 1.7));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x070910);
scene.fog = new THREE.Fog(0x070910, 16, 95);

const camera = new THREE.PerspectiveCamera(72, innerWidth/innerHeight, .1, 400);
let player = new THREE.Object3D();
player.position.set(0, 1.7, 12);
scene.add(player);
player.add(camera);

const amb = new THREE.AmbientLight(0x657088, .75); scene.add(amb);
const moon = new THREE.DirectionalLight(0xffffff, 1.1); moon.position.set(15,35,10); moon.castShadow=true; scene.add(moon);
const redLight = new THREE.PointLight(0xff2222, 2.2, 22); redLight.position.set(-8,5,1); scene.add(redLight);

const loader = new THREE.TextureLoader(); loader.crossOrigin = 'anonymous';
function tex(url){ const t = loader.load(url); t.colorSpace = THREE.SRGBColorSpace; t.wrapS = t.wrapT = THREE.RepeatWrapping; return t; }
const texSky = tex('https://commons.wikimedia.org/wiki/Special:Redirect/file/Modern_skyscraper_facades_(Unsplash).jpg');
const texFacade = tex('https://commons.wikimedia.org/wiki/Special:Redirect/file/Futuristic_facade_(Unsplash).jpg');
const texOld = tex('https://commons.wikimedia.org/wiki/Special:Redirect/file/Textured_facade.jpg');
const texHouse = tex('https://commons.wikimedia.org/wiki/Special:Redirect/file/Mezmay,_Rural_house,_Izba,_Kuren,_Russia.jpg');
texSky.repeat.set(1,2); texFacade.repeat.set(1,1.6); texOld.repeat.set(1,1.2); texHouse.repeat.set(1,1);

const matRoad = new THREE.MeshStandardMaterial({color:0x171923, roughness:.8});
const matGround = new THREE.MeshStandardMaterial({color:0x263326, roughness:.9});
const matWindow = new THREE.MeshStandardMaterial({color:0xffee99, emissive:0xaa6611, emissiveIntensity:.25});
const matWall = new THREE.MeshStandardMaterial({color:0x262833, roughness:.8});
const matDark = new THREE.MeshStandardMaterial({color:0x0b0c10, roughness:.8});

function box(w,h,d,mat,x,y,z){ const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat); m.position.set(x,y,z); m.castShadow=true; m.receiveShadow=true; scene.add(m); return m; }
function cyl(r,h,mat,x,y,z){ const m=new THREE.Mesh(new THREE.CylinderGeometry(r,r,h,16),mat); m.position.set(x,y,z); m.castShadow=true; scene.add(m); return m; }

box(130,.1,130,matGround,0,-.05,0);
box(16,.04,130,matRoad,0,.01,0);
for(let i=-60;i<=60;i+=12){ box(.25,.03,5,new THREE.MeshStandardMaterial({color:0xdedede, emissive:0x555555, emissiveIntensity:.2}),0,.04,i); }

const buildingMats = [new THREE.MeshStandardMaterial({map:texSky, roughness:.65}), new THREE.MeshStandardMaterial({map:texFacade, roughness:.55}), new THREE.MeshStandardMaterial({map:texOld, roughness:.75})];
for(let i=0;i<22;i++){
  const side = i%2?1:-1; const z=-55+i*5.6; const h=10+Math.random()*24; const w=7+Math.random()*5; const d=5+Math.random()*4;
  const b=box(w,h,d,buildingMats[i%3],side*(13+Math.random()*9),h/2,z);
  for(let yy=3; yy<h-1; yy+=3){ for(let xx=-w/2+1.1; xx<w/2-1; xx+=2.1){ const win=box(.75,.9,.04,matWindow,b.position.x+xx,yy,b.position.z+side*d/2+.04*side); }}
}

// crime scene
box(5,.05,5,new THREE.MeshStandardMaterial({color:0x3b1515}),-5,.03,7);
cyl(.06,2.7,new THREE.MeshStandardMaterial({color:0xffddaa}),-7,1.35,4);
box(.8,1.15,.35,new THREE.MeshStandardMaterial({color:0x143f77}),-7,.75,4);
box(1,.9,.4,new THREE.MeshStandardMaterial({color:0x222}),-7,2.65,4);

const npcs=[];
function npc(name,x,z,color,dialogId){
  const g=new THREE.Group(); g.position.set(x,0,z); scene.add(g);
  const body=new THREE.Mesh(new THREE.CylinderGeometry(.35,.45,1.35,16), new THREE.MeshStandardMaterial({color})); body.position.y=.85; g.add(body);
  const head=new THREE.Mesh(new THREE.SphereGeometry(.32,16,16), new THREE.MeshStandardMaterial({color:0xf0c8a0})); head.position.y=1.72; g.add(head);
  const label=document.createElement('div');
  npcs.push({name, obj:g, dialogId, talked:false}); return g;
}
npc('Охранник',3,7,0x3a6ca8,'guard'); npc('Соседка',-10,-2,0x8a3aa8,'woman'); npc('Курьер',7,-13,0xaaaa33,'courier');

// car
const car = new THREE.Group(); scene.add(car); car.position.set(4,.05,18);
car.add(new THREE.Mesh(new THREE.BoxGeometry(3.2,.7,5), new THREE.MeshStandardMaterial({color:0x111318, metalness:.5, roughness:.35})));
let cab=new THREE.Mesh(new THREE.BoxGeometry(2.2,.75,2), new THREE.MeshStandardMaterial({color:0x223355, transparent:true, opacity:.78})); cab.position.y=.75; cab.position.z=-.3; car.add(cab);
for(const x of [-1.35,1.35]) for(const z of [-1.6,1.6]){ const wh=new THREE.Mesh(new THREE.CylinderGeometry(.38,.38,.28,20), matDark); wh.rotation.z=Math.PI/2; wh.position.set(x,-.25,z); car.add(wh); }

// country house outside and simple interiors
const house = new THREE.Group(); scene.add(house); house.position.set(0,0,-90); house.visible=false;
const houseMat = new THREE.MeshStandardMaterial({map:texHouse, roughness:.75});
house.add(new THREE.Mesh(new THREE.BoxGeometry(14,6,10), houseMat)); house.children[0].position.y=3;
const roof=new THREE.Mesh(new THREE.ConeGeometry(10,3,4), new THREE.MeshStandardMaterial({color:0x431616})); roof.rotation.y=Math.PI/4; roof.position.y=7.5; house.add(roof);
const door=new THREE.Mesh(new THREE.BoxGeometry(2.2,3,.08), new THREE.MeshStandardMaterial({color:0x26120a})); door.position.set(0,1.5,5.05); house.add(door);

const rooms=new THREE.Group(); scene.add(rooms); rooms.visible=false;
function makeFloor(level,y,color){
  const group=new THREE.Group(); group.position.y=y; rooms.add(group);
  const floor=new THREE.Mesh(new THREE.BoxGeometry(24,.2,18), new THREE.MeshStandardMaterial({color:0x25252b})); floor.receiveShadow=true; group.add(floor);
  const wallMat=new THREE.MeshStandardMaterial({color});
  const back=new THREE.Mesh(new THREE.BoxGeometry(24,4,.3),wallMat); back.position.set(0,2,-9); group.add(back);
  const front=new THREE.Mesh(new THREE.BoxGeometry(24,4,.3),wallMat); front.position.set(0,2,9); group.add(front);
  const left=new THREE.Mesh(new THREE.BoxGeometry(.3,4,18),wallMat); left.position.set(-12,2,0); group.add(left);
  const right=new THREE.Mesh(new THREE.BoxGeometry(.3,4,18),wallMat); right.position.set(12,2,0); group.add(right);
  group.userData.level=level; return group;
}
makeFloor(1,0,0x3a332d); makeFloor(0,-7,0x202225); makeFloor(2,7,0x2f3340);
const criminal=npc('Преступник',0,-6,0x771111,'criminal'); criminal.visible=false;

let mode='city', floor=1, clue=0, hasAddress=false, caught=false;
let yaw=Math.PI, pitch=0; let keys={up:false,down:false,left:false,right:false};
let near=null; const task=document.getElementById('task'); const dialog=document.getElementById('dialog');
function setTask(t){ task.innerHTML=t; }
setTask('Место преступления. Допроси свидетелей. Ищи зацепку: охранник, соседка, курьер.');

const dialogs={
 guard:{speaker:'Охранник',text:'Я видел серую машину. Она рванула с места сразу после крика.',choices:[['Номер видел?','Только последние цифры: 47.'],['Куда поехала?','В сторону старой трассы, за город.']]},
 woman:{speaker:'Соседка',text:'Перед убийством жертва спорила с мужчиной в тёмной куртке.',choices:[['О чём спорили?','Про какой-то дом у леса. Он говорил: «там всё закончится».'],['Ты знаешь его?','Лица не видела, но голос хриплый.']]},
 courier:{speaker:'Курьер',text:'Я доставлял посылку. На коробке был адрес: дом у старой водонапорной башни.',choices:[['Это точный адрес?','Да. Я отмечу точку на карте. Машина рядом.'],['Кто получатель?','Фамилия липовая, но получатель был в тёмной куртке.']]},
 criminal:{speaker:'Преступник',text:'Поздно, детектив. Не надо было заходить в этот дом.',choices:[['Ты арестован.','Ты нашёл преступника. Дело закрыто.']]}
};
function showDialog(id){
  const d=dialogs[id]; dialog.style.display='block'; document.getElementById('speaker').textContent=d.speaker; document.getElementById('text').textContent=d.text;
  const ch=document.getElementById('choices'); ch.innerHTML='';
  d.choices.forEach((c,i)=>{ const b=document.createElement('button'); b.className='choice'; b.textContent=c[0]; b.onclick=()=>{ document.getElementById('text').textContent=c[1]; ch.innerHTML=''; const ok=document.createElement('button'); ok.className='choice'; ok.textContent='Продолжить'; ok.onclick=()=>{ dialog.style.display='none'; onTalk(id); }; ch.appendChild(ok); }; ch.appendChild(b); });
}
function onTalk(id){
  if(['guard','woman','courier'].includes(id)){ clue++; if(id==='courier') hasAddress=true; }
  if(clue>=3||hasAddress){ hasAddress=true; setTask('Есть адрес: старый дом у водонапорной башни. Подойди к машине и нажми «Действие».'); }
  if(id==='criminal'){ caught=true; flash('ПРЕСТУПНИК НАЙДЕН\nДЕЛО ЗАКРЫТО'); }
}
function flash(t){ const f=document.getElementById('flash'); f.innerText=t; f.style.display='flex'; setTimeout(()=>f.style.display='none',2500); }

function dist(a,b){ return a.position.distanceTo(b.position); }
function nearest(){
  near=null; let best=3.2;
  if(mode==='city'){
    for(const n of npcs){ const d=player.position.distanceTo(new THREE.Vector3(n.obj.position.x,1.7,n.obj.position.z)); if(d<best){best=d; near=n;} }
    if(player.position.distanceTo(new THREE.Vector3(car.position.x,1.7,car.position.z))<4){ near={name:'Машина',car:true}; }
  } else if(mode==='house'){
    const cp=new THREE.Vector3(criminal.position.x,player.position.y,criminal.position.z); if(floor===2 && player.position.distanceTo(cp)<4) near={name:'Преступник',dialogId:'criminal'};
  }
  document.getElementById('action').textContent = near ? (near.car?'Ехать': 'Говорить') : 'Действие';
}
function useAction(){
  if(dialog.style.display==='block') return;
  if(!near) return;
  if(near.car){ if(!hasAddress){ flash('Сначала найди адрес у свидетелей'); return; } driveToHouse(); return; }
  if(near.dialogId) showDialog(near.dialogId);
}
function driveToHouse(){
  flash('Ты сел в машину\nДорога уходит за город...');
  mode='drive'; setTask('Едешь за город. Камера свободная, дорога впереди.');
  setTimeout(()=>{ mode='outside'; player.position.set(0,1.7,-75); yaw=Math.PI; pitch=0; house.visible=true; car.position.set(-8,.05,-74); setTask('Ты у загородного дома. Подойди к двери и нажми «Действие», чтобы войти.'); },2200);
}
function enterHouse(){ mode='house'; house.visible=false; rooms.visible=true; criminal.visible=true; setFloor(1); document.getElementById('floorBtns').style.display='flex'; setTask('Дом. Осмотри 1 этаж, подвал и 2 этаж. Преступник где-то внутри.'); }
function setFloor(f){ floor=Number(f); player.position.set(0, f===0?-5.3:f===2?8.7:1.7, 5); criminal.position.set(0,8.7,-6); criminal.visible=(mode==='house'&&floor===2); }
function exitHouse(){ mode='outside'; rooms.visible=false; house.visible=true; criminal.visible=false; document.getElementById('floorBtns').style.display='none'; player.position.set(0,1.7,-75); setTask('Ты вышел из дома. Можно вернуться внутрь.'); }

document.getElementById('action').onclick=useAction;
document.querySelectorAll('#floorBtns button').forEach(b=>b.onclick=()=> b.dataset.floor==='city'?exitHouse():setFloor(b.dataset.floor));
['up','down','left','right'].forEach(id=>{ const el=document.getElementById(id); el.addEventListener('touchstart',e=>{e.preventDefault(); keys[id]=true;},{passive:false}); el.addEventListener('touchend',e=>{e.preventDefault(); keys[id]=false;},{passive:false}); el.addEventListener('mousedown',()=>keys[id]=true); el.addEventListener('mouseup',()=>keys[id]=false); });

let looking=false,lastX=0,lastY=0;
window.addEventListener('touchstart',e=>{ if(e.target.closest('button')||e.target.closest('#dialog'))return; looking=true; lastX=e.touches[0].clientX; lastY=e.touches[0].clientY;},{passive:true});
window.addEventListener('touchmove',e=>{ if(!looking)return; const x=e.touches[0].clientX,y=e.touches[0].clientY; yaw -= (x-lastX)*.006; pitch -= (y-lastY)*.006; pitch=Math.max(-1.35,Math.min(1.35,pitch)); lastX=x; lastY=y;},{passive:true});
window.addEventListener('touchend',()=>looking=false);
window.addEventListener('mousemove',e=>{ if(e.buttons!==1)return; yaw-=e.movementX*.004; pitch-=e.movementY*.004; pitch=Math.max(-1.35,Math.min(1.35,pitch)); });
window.addEventListener('keydown',e=>{ if(e.key==='w'||e.key==='ц')keys.up=true; if(e.key==='s'||e.key==='ы')keys.down=true; if(e.key==='a'||e.key==='ф')keys.left=true; if(e.key==='d'||e.key==='в')keys.right=true; if(e.key==='e'||e.key==='у')useAction(); });
window.addEventListener('keyup',e=>{ if(e.key==='w'||e.key==='ц')keys.up=false; if(e.key==='s'||e.key==='ы')keys.down=false; if(e.key==='a'||e.key==='ф')keys.left=false; if(e.key==='d'||e.key==='в')keys.right=false; });

function move(dt){
  if(dialog.style.display==='block') return;
  const sp= mode==='drive'? 0 : 8*dt; const fwd=new THREE.Vector3(Math.sin(yaw),0,Math.cos(yaw)); const right=new THREE.Vector3(Math.cos(yaw),0,-Math.sin(yaw));
  let v=new THREE.Vector3(); if(keys.up)v.add(fwd); if(keys.down)v.sub(fwd); if(keys.right)v.add(right); if(keys.left)v.sub(right); if(v.length()>0){v.normalize().multiplyScalar(sp); player.position.add(v);}
  if(mode==='outside' && player.position.distanceTo(new THREE.Vector3(0,1.7,-85))<12) document.getElementById('action').textContent='Войти';
  if(mode==='outside' && player.position.distanceTo(new THREE.Vector3(0,1.7,-85))<6) near={name:'Дом',enter:true};
  if(mode==='outside' && near&&near.enter){};
}
const oldUse=useAction;
document.getElementById('action').onclick=()=>{ if(mode==='outside' && player.position.distanceTo(new THREE.Vector3(0,1.7,-85))<8){enterHouse();return;} useAction(); };

let last=performance.now();
function loop(now){
  const dt=Math.min(.05,(now-last)/1000); last=now;
  player.rotation.y=yaw; camera.rotation.x=pitch;
  if(mode==='drive'){
    player.position.set(0,1.7,12); car.position.z -= 18*dt; house.visible=false; if(car.position.z<-62){ mode='outside'; player.position.set(0,1.7,-75); car.position.set(-8,.05,-74); house.visible=true; setTask('Ты у загородного дома. Подойди к двери.'); }
  } else { move(dt); nearest(); }
  renderer.render(scene,camera); requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
window.addEventListener('resize',()=>{ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); });
</script>
</body>
</html>
