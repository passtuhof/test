<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#07110c" />
  <title>Рулетка</title>
  <style>
    :root {
      --bg-1: #3a2418;
      --bg-2: #120b08;
      --gold-1: #f3d89a;
      --gold-2: #ad7a32;
      --gold-3: #4f3215;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 38%, rgba(118, 82, 48, .35), transparent 34%),
        linear-gradient(rgba(30, 17, 11, .28), rgba(15, 8, 5, .52)),
        repeating-linear-gradient(
          90deg,
          rgba(255,255,255,.018) 0,
          rgba(255,255,255,.018) 2px,
          rgba(0,0,0,.03) 3px,
          rgba(0,0,0,.03) 6px
        ),
        radial-gradient(circle at 50% 50%, var(--bg-1), var(--bg-2) 76%);
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
    }

    body {
      display: grid;
      place-items: center;
      font-family: Arial, Helvetica, sans-serif;
    }

    #stage {
      position: relative;
      width: min(94vw, 94vh);
      height: min(94vw, 94vh);
      max-width: 1100px;
      max-height: 1100px;
      cursor: pointer;
      filter:
        drop-shadow(0 34px 46px rgba(0, 0, 0, .7))
        sepia(.08);
      transition: transform .16s ease;
    }

    #stage:active {
      transform: scale(.992);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .17;
      mix-blend-mode: soft-light;
      background-image:
        radial-gradient(circle at 20% 30%, rgba(255,255,255,.11) 0 1px, transparent 1.5px),
        radial-gradient(circle at 80% 65%, rgba(0,0,0,.18) 0 1px, transparent 1.5px);
      background-size: 9px 9px, 13px 13px;
    }

    #ball {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 3.5%;
      aspect-ratio: 1;
      border-radius: 50%;
      pointer-events: none;
      opacity: 0;
      z-index: 4;
      transform: translate(-50%, -50%);
      background:
        radial-gradient(circle at 32% 27%, #ffffff 0 14%, #f7eed6 27%, #bcae93 58%, #4f463a 100%);
      box-shadow:
        0 2px 4px rgba(0,0,0,.72),
        inset -2px -3px 4px rgba(0,0,0,.3),
        inset 2px 2px 3px rgba(255,255,255,.6);
      will-change: transform, opacity;
    }

    #pointer {
      position: absolute;
      left: 50%;
      top: -1.8%;
      width: 7.5%;
      height: 14%;
      transform: translateX(-50%);
      pointer-events: none;
      filter: drop-shadow(0 5px 4px rgba(0, 0, 0, .55));
    }

    #pointer::before {
      content: "";
      position: absolute;
      inset: 0;
      clip-path: polygon(50% 100%, 4% 8%, 96% 8%);
      background: linear-gradient(90deg, var(--gold-3), var(--gold-1) 48%, var(--gold-2) 65%, var(--gold-3));
      border-radius: 18px;
    }

    #pointer::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 1%;
      width: 35%;
      aspect-ratio: 1;
      transform: translateX(-50%);
      border-radius: 50%;
      background: radial-gradient(circle at 38% 32%, #fff9cd, #d59621 52%, #6c3e06 100%);
      box-shadow: 0 0 0 2px rgba(255, 238, 167, .45);
    }

    @media (orientation: landscape) {
      #stage {
        width: min(92vh, 92vw);
        height: min(92vh, 92vw);
      }
    }
  </style>
</head>
<body>
  <div id="stage" aria-label="Нажмите, чтобы вращать рулетку">
    <canvas id="roulette"></canvas>
    <div id="ball" aria-hidden="true"></div>
    <div id="pointer"></div>
  </div>

  <script>
    (() => {
      "use strict";

      const canvas = document.getElementById("roulette");
      const stage = document.getElementById("stage");
      const ball = document.getElementById("ball");
      const ctx = canvas.getContext("2d");

      const SEGMENTS = 36;
      const labels = Array.from({ length: SEGMENTS }, (_, i) => i % 2 === 0 ? "Д" : "М");
      const colors = {
        girlA: "#ff5e9c",
        girlB: "#c82968",
        boyA: "#3f9cff",
        boyB: "#145fc0",
        dark: "#0a110d",
        goldLight: "#fff2ad",
        gold: "#d69a22",
        goldDark: "#6e4308",
        ivory: "#fff8df"
      };

      let size = 0;
      let dpr = 1;
      let rotation = 0;
      let spinning = false;
      let startTime = 0;
      let duration = 0;
      let startRotation = 0;
      let finalRotation = 0;
      let lastFrame = 0;
      let targetIndex = 0;
      let ballStartAngle = 0;
      let ballTravel = 0;
      let ballFinalAngle = 0;
      let audioCtx = null;
      let spinNoise = null;
      let spinGain = null;
      let clickTimer = null;
      let audioUnlocked = false;


      async function ensureAudio() {
        if (!audioCtx) {
          const AudioContextClass = window.AudioContext || window.webkitAudioContext;
          if (!AudioContextClass) return false;
          audioCtx = new AudioContextClass();
        }

        if (audioCtx.state === "suspended") {
          try { await audioCtx.resume(); } catch (_) {}
        }

        return audioCtx.state === "running";
      }

      async function unlockAudio() {
        if (audioUnlocked) return true;
        const ready = await ensureAudio();
        if (!ready || !audioCtx) return false;

        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        gain.gain.setValueAtTime(0.0001, audioCtx.currentTime);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(audioCtx.currentTime);
        osc.stop(audioCtx.currentTime + 0.02);

        audioUnlocked = true;
        return true;
      }

      function startSpinSound() {
        if (!audioCtx || audioCtx.state !== "running") return;

        const bufferSize = audioCtx.sampleRate * 2;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
          data[i] = (Math.random() * 2 - 1) * 0.22;
        }

        spinNoise = audioCtx.createBufferSource();
        spinNoise.buffer = buffer;
        spinNoise.loop = true;

        const filter = audioCtx.createBiquadFilter();
        filter.type = "bandpass";
        filter.frequency.value = 430;
        filter.Q.value = 0.7;

        spinGain = audioCtx.createGain();
        spinGain.gain.setValueAtTime(0.0001, audioCtx.currentTime);
        spinGain.gain.exponentialRampToValueAtTime(0.17, audioCtx.currentTime + 0.12);

        spinNoise.connect(filter);
        filter.connect(spinGain);
        spinGain.connect(audioCtx.destination);
        spinNoise.start();

        let interval = 70;
        const tick = () => {
          if (!spinning) return;
          makeTick();
          interval = Math.min(240, interval * 1.045);
          clickTimer = setTimeout(tick, interval);
        };
        clickTimer = setTimeout(tick, 90);
      }

      function stopSpinSound() {
        if (clickTimer) {
          clearTimeout(clickTimer);
          clickTimer = null;
        }

        if (spinGain && audioCtx) {
          const now = audioCtx.currentTime;
          spinGain.gain.cancelScheduledValues(now);
          spinGain.gain.setValueAtTime(Math.max(spinGain.gain.value, 0.0001), now);
          spinGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.35);
        }

        if (spinNoise && audioCtx) {
          try { spinNoise.stop(audioCtx.currentTime + 0.38); } catch (_) {}
        }
      }

      function makeTick() {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = "triangle";
        osc.frequency.setValueAtTime(820 + Math.random() * 260, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.045, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.045);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.05);
      }

      function playDropSound() {
        if (!audioCtx || audioCtx.state !== "running") return;
        const now = audioCtx.currentTime;

        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = "sine";
        osc.frequency.setValueAtTime(390, now);
        osc.frequency.exponentialRampToValueAtTime(110, now + 0.16);
        gain.gain.setValueAtTime(0.23, now);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.22);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + 0.24);

        for (let i = 0; i < 3; i++) {
          setTimeout(makeTick, i * 65);
        }
      }

      function updateBall(t) {
        const outerOrbit = size * 0.445;
        const pocketOrbit = size * 0.315;

        // Continuous trajectory: no angle wrapping, no jumps.
        const angularEase = 1 - Math.pow(1 - t, 3.6);
        const angle = ballStartAngle + ballTravel * angularEase;

        // The ball first rolls on the outer rail, then smoothly drops inward.
        let inward = 0;
        if (t > 0.52) {
          const p = Math.min(1, (t - 0.52) / 0.48);
          inward = p * p * (3 - 2 * p);
        }

        let radius = outerOrbit + (pocketOrbit - outerOrbit) * inward;

        // Subtle rail vibration that fades naturally.
        radius += Math.sin(t * Math.PI * 28) * size * 0.0055 * (1 - t);

        // Gentle settling bounce in the pocket.
        if (t > 0.86) {
          const p = (t - 0.86) / 0.14;
          radius += Math.sin(p * Math.PI * 4) * size * 0.007 * (1 - p);
        }

        const x = Math.cos(angle) * radius;
        const y = Math.sin(angle) * radius;

        let scaleX = 1;
        let scaleY = 1;
        if (t > 0.94) {
          const p = (t - 0.94) / 0.06;
          const squash = Math.sin(p * Math.PI) * 0.12;
          scaleX = 1 + squash;
          scaleY = 1 - squash;
        }

        ball.style.opacity = "1";
        ball.style.transform =
          `translate(calc(-50% + ${x}px), calc(-50% + ${y}px)) scale(${scaleX}, ${scaleY})`;
      }

      function resize() {
        const rect = stage.getBoundingClientRect();
        size = Math.max(320, Math.floor(Math.min(rect.width, rect.height)));
        dpr = Math.min(window.devicePixelRatio || 1, 2);
        canvas.width = Math.round(size * dpr);
        canvas.height = Math.round(size * dpr);
        canvas.style.width = size + "px";
        canvas.style.height = size + "px";
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        draw();
      }

      function ringGradient(cx, cy, inner, outer) {
        const g = ctx.createRadialGradient(cx, cy, inner, cx, cy, outer);
        g.addColorStop(0, colors.goldDark);
        g.addColorStop(.35, colors.gold);
        g.addColorStop(.52, colors.goldLight);
        g.addColorStop(.7, colors.gold);
        g.addColorStop(1, colors.goldDark);
        return g;
      }

      function drawCircle(cx, cy, r, fill, stroke, lineWidth = 1) {
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        if (fill) {
          ctx.fillStyle = fill;
          ctx.fill();
        }
        if (stroke) {
          ctx.strokeStyle = stroke;
          ctx.lineWidth = lineWidth;
          ctx.stroke();
        }
      }

      function draw() {
        if (!size) return;

        const cx = size / 2;
        const cy = size / 2;
        const outerR = size * .49;
        const wheelR = size * .415;
        const innerR = size * .17;
        const step = Math.PI * 2 / SEGMENTS;

        ctx.clearRect(0, 0, size, size);

        // Aged brass and dark wood body
        drawCircle(cx, cy, outerR, ringGradient(cx, cy, outerR * .55, outerR), "#e4c37b", size * .006);
        drawCircle(cx, cy, outerR * .93, "#2a1911", "#5a371b", size * .012);
        drawCircle(cx, cy, outerR * .885, ringGradient(cx, cy, outerR * .55, outerR * .9), "#d8b66e", size * .004);
        drawCircle(cx, cy, outerR * .84, colors.dark, "#3b2413", size * .01);

        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(rotation);

        // Colored pockets
        for (let i = 0; i < SEGMENTS; i++) {
          const a0 = -Math.PI / 2 + i * step;
          const a1 = a0 + step;
          const isGirl = labels[i] === "Д";
          const grad = ctx.createLinearGradient(
            Math.cos(a0) * innerR,
            Math.sin(a0) * innerR,
            Math.cos(a1) * wheelR,
            Math.sin(a1) * wheelR
          );
          if (isGirl) {
            grad.addColorStop(0, colors.girlB);
            grad.addColorStop(1, colors.girlA);
          } else {
            grad.addColorStop(0, colors.boyB);
            grad.addColorStop(1, colors.boyA);
          }

          ctx.beginPath();
          ctx.arc(0, 0, wheelR, a0, a1);
          ctx.arc(0, 0, innerR, a1, a0, true);
          ctx.closePath();
          ctx.fillStyle = grad;
          ctx.fill();

          ctx.strokeStyle = "#b88a4a";
          ctx.lineWidth = size * .0042;
          ctx.stroke();

          const mid = a0 + step / 2;
          const textR = (wheelR + innerR) / 2 + size * .006;
          ctx.save();
          ctx.translate(Math.cos(mid) * textR, Math.sin(mid) * textR);
          ctx.rotate(mid + Math.PI / 2);
          ctx.fillStyle = colors.ivory;
          ctx.font = `900 ${size * .046}px Arial, Helvetica, sans-serif`;
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.shadowColor = "rgba(25,12,8,.85)";
          ctx.shadowBlur = size * .008;
          ctx.shadowOffsetY = size * .003;
          ctx.fillText(labels[i], 0, 0);
          ctx.restore();
        }

        // Pocket borders
        drawCircle(0, 0, wheelR, null, "#d6b26e", size * .007);
        drawCircle(0, 0, innerR, colors.dark, "#9f7132", size * .009);

        // Decorative gold studs
        const studR = size * .0105;
        const studOrbit = size * .145;
        for (let i = 0; i < 12; i++) {
          const a = i * Math.PI * 2 / 12;
          const x = Math.cos(a) * studOrbit;
          const y = Math.sin(a) * studOrbit;
          const sg = ctx.createRadialGradient(x - studR * .35, y - studR * .4, studR * .1, x, y, studR);
          sg.addColorStop(0, "#fffbd6");
          sg.addColorStop(.35, "#e9b94e");
          sg.addColorStop(1, "#6b3c04");
          drawCircle(x, y, studR, sg, "#f7d477", size * .0015);
        }

        ctx.restore();

        // Fixed center cap
        const centerGrad = ctx.createRadialGradient(
          cx - innerR * .35, cy - innerR * .35, innerR * .05,
          cx, cy, innerR * .92
        );
        centerGrad.addColorStop(0, "#fff8c6");
        centerGrad.addColorStop(.22, "#e7b742");
        centerGrad.addColorStop(.58, "#9e620c");
        centerGrad.addColorStop(1, "#3a2102");
        drawCircle(cx, cy, innerR * .72, centerGrad, "#f5d06f", size * .008);
        drawCircle(cx, cy, innerR * .42, colors.dark, "#dba83f", size * .006);

        // Center spindle
        const spindle = ctx.createRadialGradient(
          cx - innerR * .12, cy - innerR * .15, 1,
          cx, cy, innerR * .28
        );
        spindle.addColorStop(0, "#ffffff");
        spindle.addColorStop(.28, "#f5d56f");
        spindle.addColorStop(.66, "#b77710");
        spindle.addColorStop(1, "#4f2c03");
        drawCircle(cx, cy, innerR * .22, spindle, "#fff0a0", size * .004);
      }

      function easeOutQuint(t) {
        return 1 - Math.pow(1 - t, 5);
      }

      function animate(now) {
        if (!spinning) return;

        const elapsed = now - startTime;
        const t = Math.min(1, elapsed / duration);
        const eased = easeOutQuint(t);
        rotation = startRotation + (finalRotation - startRotation) * eased;

        draw();
        updateBall(t);

        if (t < 1) {
          lastFrame = requestAnimationFrame(animate);
        } else {
          spinning = false;
          rotation = finalRotation % (Math.PI * 2);
          draw();
          updateBall(1);
          stopSpinSound();
          playDropSound();
        }
      }

      async function spin() {
        if (spinning) return;

        await unlockAudio();
        spinning = true;
        cancelAnimationFrame(lastFrame);

        targetIndex = Math.floor(Math.random() * SEGMENTS);
        const step = Math.PI * 2 / SEGMENTS;
        const desiredCenterAtPointer = -Math.PI / 2 - (targetIndex + 0.5) * step;
        const currentBase = rotation;
        const fullTurns = 7 + Math.floor(Math.random() * 4);

        startRotation = rotation;
        finalRotation = currentBase + fullTurns * Math.PI * 2 +
          ((desiredCenterAtPointer - currentBase) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2);

        duration = 6500 + Math.random() * 900;
        startTime = performance.now();
        // The ball moves continuously in the opposite direction and ends at the pointer.
        ballStartAngle = Math.random() * Math.PI * 2;
        ballFinalAngle = -Math.PI / 2;
        const ballTurns = 11 + Math.floor(Math.random() * 3);
        ballTravel = ballFinalAngle - ballStartAngle - ballTurns * Math.PI * 2;
        ball.style.opacity = "1";

        startSpinSound();

        if (navigator.vibrate) navigator.vibrate(25);
        requestAnimationFrame(animate);
      }

      stage.addEventListener("pointerdown", unlockAudio, { passive: true });
      stage.addEventListener("touchstart", unlockAudio, { passive: true });
      stage.addEventListener("click", spin);
      stage.addEventListener("keydown", (event) => {
        if (event.code === "Space" || event.code === "Enter") {
          event.preventDefault();
          spin();
        }
      });

      stage.tabIndex = 0;
      window.addEventListener("resize", resize, { passive: true });
      window.addEventListener("orientationchange", () => setTimeout(resize, 100), { passive: true });

      resize();
    })();
  </script>
</body>
</html>
